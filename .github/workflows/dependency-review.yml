name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - pnpm-lock.yaml
      - yarn.lock
      - packages/**/package.json

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    uses: ArchonVII/github-workflows/.github/workflows/dependency-review.yml@v1
    with:
      fail-on-severity: 'high'
      fail-on-scopes: 'runtime'
      comment-summary-in-pr: 'on-failure'
